name: Tests

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, ubuntu-24.04-arm]
        node-version: [22.x, 23.x, 24.x]

    name: Node ${{ matrix.node-version }} - ${{ matrix.os }}

    permissions:
      actions: write # Required for canceling previous workflow runs
      contents: read

    steps:
    - name: Cancel Previous Runs
      uses: styfle/cancel-workflow-action@d07a454dad7609a92316b57b23c9ccfd4f59af66 # 0.13.1
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.id == github.event.pull_request.base.repo.id }}
      with:
        access_token: ${{ github.token }}

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: npm

    - run: npm ci
    - run: npm run lint
    - run: npm run jison
    - name: Check unchanged parser
      shell: bash
      run: |
        git status
        exit $(git status --porcelain=v1 2>/dev/null | grep -c lib/tldr-parser.js)
    - run: npm run test
      env:
        FORCE_COLOR: true

  build-image:
      runs-on: ubuntu-latest
      needs: build
      permissions:
        contents: read

      steps:
        - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

        - name: Build the Docker image
          uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
          with:
            context: .
            file: Dockerfile
            push: false
            tags: tldr-lint:latest
            cache-from: type=gha
            cache-to: type=gha,mode=max
            platforms: linux/amd64
